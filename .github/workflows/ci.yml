name: CI Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Restore dependencies
        run: dotnet restore src/SystemObserver.sln
        
      - name: Build
      run: dotnet build src/SystemObserver.sln --configuration Release

    - name: Run tests
      run: dotnet test tests/SystemObserver.Tests/SystemObserver.Tests.csproj --configuration Release --no-build
        
      - name: Test
        run: dotnet test src/SystemObserver.sln --no-build --verbosity normal --configuration Release
        
