name: CI Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Restore dependencies
        run: dotnet restore src/SystemObserver.sln
        
      - name: Build and Test
      run: |
        dotnet build SystemObserver.sln --configuration Release
        dotnet test SystemObserver.sln --configuration Release --no-build
